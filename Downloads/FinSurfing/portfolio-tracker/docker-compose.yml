version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=production
    restart: always

  frontend:
    build:
      context: ./frontend
    ports:
      - "4000:4000"
    environment:
      - NEXT_PUBLIC_WS_URL=ws://backend:8001/ws/market-data
    depends_on:
      - backend
    restart: always
