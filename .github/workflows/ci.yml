name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-for-jest-only-32chars

      # Production bundle smoke: Jest never runs `vite build`, so import-path /
      # CommonJS-interop / bundling errors used to slip through CI and only fail
      # the Railway deploy. This fails the PR instead.
      - name: Build (vite production bundle)
        run: npm run build
