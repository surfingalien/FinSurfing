<!doctype html>
<html lang="en" data-ha-style="map-atlas">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam Reyes — Saved Places</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #a03b00;
  --primary-container: #c94c00;
  --primary-fixed: #ffdbcd;
  --primary-fixed-dim: #ffb597;
  --on-primary: #ffffff;
  --accent-glow: #E8400D;
  --secondary: #d5baff;
  --secondary-container: #7b40e0;
  --tertiary: #4d44e3;
  --accent-cyan: #00D4FF;
  --bg: #fff8f6;
  --surface: #fff8f6;
  --surface-container-lowest: #ffffff;
  --surface-container-low: #fbf2ef;
  --surface-container: #f5ece9;
  --surface-container-high: #efe6e3;
  --fg-1: #1e1b19;
  --fg-2: #594138;
  --fg-muted: #8d7166;
  --border: rgba(0,0,0,0.06);
  --border-strong: rgba(0,0,0,0.12);
  --outline-variant: #e1bfb2;
  --green: #10b981;
  --blue: #3b82f6;
  --yellow: #f59e0b;
  --red: #ef4444;
  --font-headline: 'Space Grotesk', ui-sans-serif, system-ui, sans-serif;
  --font-body: 'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'SF Mono','Menlo',ui-monospace,monospace;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px;
  --space-lg: 16px; --space-xl: 20px; --space-2xl: 24px;
  --space-3xl: 32px; --space-4xl: 48px; --space-5xl: 64px;
  --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
  --radius-xl: 20px; --radius-2xl: 28px; --radius-pill: 9999px;
  --shadow-sm: 0 1px 2px rgba(30,27,25,0.04);
  --shadow-md: 0 4px 12px rgba(30,27,25,0.08);
  --shadow-lg: 0 8px 24px rgba(30,27,25,0.12);
  --shadow-accent: 0 8px 24px rgba(160,59,0,0.15);
  --gradient-primary: linear-gradient(135deg,#a03b00 0%,#c94c00 100%);
  --gradient-hero: linear-gradient(135deg,#a03b00 0%,#7b40e0 100%);
  --map-land: #e8ddd5;
  --map-water: #d4e8ef;
  --map-border: #c4b4aa;
  --pin-shadow: rgba(160,59,0,0.35);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #060B18;
    --surface: #0B1426;
    --surface-container-lowest: #101D35;
    --surface-container-low: #101D35;
    --surface-container: #162544;
    --surface-container-high: #1c2d52;
    --fg-1: #F8FAFC;
    --fg-2: #CBD5E1;
    --fg-muted: #64748B;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --primary: #FF6B35;
    --accent-glow: #00D4FF;
    --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    --map-land: #1a2540;
    --map-water: #0a1628;
    --map-border: #2a3a5a;
    --pin-shadow: rgba(255,107,53,0.4);
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--fg-1);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.55;
  min-height:100vh;
}

/* ── MAP SHELL ── */
.map-shell{
  display:grid;
  grid-template-rows:auto 1fr;
  min-height:100vh;
}

/* ── HEADER ── */
.atlas-header{
  padding: var(--space-lg) var(--space-2xl);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:var(--space-lg);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:var(--shadow-sm);
  flex-wrap:wrap;
}
.atlas-title{
  font-family:var(--font-headline);
  font-size:1.15rem;
  font-weight:700;
  letter-spacing:-0.01em;
  color:var(--fg-1);
  display:flex;
  align-items:center;
  gap:var(--space-sm);
}
.atlas-title-pin{
  width:22px;height:22px;
  background:var(--gradient-primary);
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  flex-shrink:0;
  box-shadow:var(--shadow-accent);
}
.atlas-header-right{
  display:flex;
  align-items:center;
  gap:var(--space-md);
  flex-wrap:wrap;
}
.search-box{
  display:flex;
  align-items:center;
  gap:var(--space-sm);
  background:var(--surface-container-low);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-pill);
  padding:var(--space-sm) var(--space-lg);
  min-width:200px;
}
.search-box input{
  border:none;
  outline:none;
  background:transparent;
  font-family:var(--font-body);
  font-size:0.875rem;
  color:var(--fg-1);
  width:100%;
}
.search-box input::placeholder{color:var(--fg-muted)}
.search-icon{color:var(--fg-muted);font-size:0.875rem;flex-shrink:0}

.view-toggle{
  display:flex;
  background:var(--surface-container);
  border-radius:var(--radius-pill);
  padding:3px;
  gap:2px;
}
.view-btn{
  border:none;
  background:transparent;
  color:var(--fg-muted);
  font-family:var(--font-body);
  font-size:0.8rem;
  font-weight:500;
  padding:var(--space-xs) var(--space-md);
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:all 160ms ease;
}
.view-btn.active{
  background:var(--surface-container-lowest);
  color:var(--fg-1);
  box-shadow:var(--shadow-sm);
}

/* ── MAIN LAYOUT ── */
.atlas-body{
  display:grid;
  grid-template-columns:1fr 380px;
  height:calc(100vh - 65px);
  overflow:hidden;
}
@media(max-width:768px){
  .atlas-body{
    grid-template-columns:1fr;
    grid-template-rows:50vh 1fr;
    height:auto;
    overflow:visible;
  }
}

/* ── ATLAS STAGE ── */
.atlas-stage{
  position:relative;
  background:var(--map-water);
  overflow:hidden;
  cursor:grab;
}
.atlas-stage:active{cursor:grabbing}
#worldSvg{
  width:100%;
  height:100%;
  display:block;
  user-select:none;
}
.map-pin{
  cursor:pointer;
  transition:transform 200ms cubic-bezier(.34,1.56,.64,1), opacity 200ms ease;
  transform-origin:50% 100%;
}
.map-pin.drop-in{
  animation:pinDrop 320ms cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pinDrop{
  from{transform:translateY(-20px) scale(0.3);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}
.map-pin:hover .pin-head{
  filter:brightness(1.2);
}
.map-pin.selected .pin-head{
  fill:var(--secondary-container)!important;
}
.map-pin.selected .pin-stem{
  fill:var(--secondary-container)!important;
}
.pin-head{fill:var(--primary);transition:fill 200ms ease}
.pin-stem{fill:var(--primary-container)}
.pin-cluster{
  cursor:pointer;
  transition:transform 200ms ease;
}
.pin-cluster:hover{transform:scale(1.1)}

/* Map tooltip */
.map-tooltip{
  position:absolute;
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-md);
  padding:var(--space-sm) var(--space-md);
  box-shadow:var(--shadow-lg);
  pointer-events:none;
  font-size:0.8rem;
  max-width:200px;
  z-index:50;
  display:none;
}
.map-tooltip strong{
  font-family:var(--font-headline);
  font-size:0.85rem;
  color:var(--fg-1);
  display:block;
  margin-bottom:2px;
}
.map-tooltip span{color:var(--fg-muted);font-size:0.75rem}

/* Zoom controls */
.zoom-controls{
  position:absolute;
  bottom:var(--space-2xl);
  right:var(--space-lg);
  display:flex;
  flex-direction:column;
  gap:var(--space-xs);
  z-index:20;
}
.zoom-btn{
  width:36px;height:36px;
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-sm);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;
  color:var(--fg-2);
  box-shadow:var(--shadow-md);
  transition:all 120ms ease;
}
.zoom-btn:hover{background:var(--surface-container);color:var(--primary)}

/* ── SIDE PANEL ── */
.place-drawer{
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
@media(max-width:768px){
  .place-drawer{
    border-left:none;
    border-top:1px solid var(--border);
    height:50vh;
  }
}

/* Stats strip inside drawer */
.atlas-stats{
  background:var(--surface-container-low);
  border-bottom:1px solid var(--border);
  padding:var(--space-lg) var(--space-xl);
}
.atlas-personal-note{
  font-family:var(--font-body);
  font-size:0.82rem;
  font-weight:500;
  color:var(--fg-2);
  line-height:1.5;
  margin-bottom:var(--space-md);
  padding:var(--space-md) var(--space-lg);
  background:var(--primary-fixed);
  border-radius:var(--radius-md);
  border-left:3px solid var(--primary);
}
@media(prefers-color-scheme:dark){
  .atlas-personal-note{
    background:rgba(160,59,0,0.15);
    border-left-color:var(--primary);
  }
}
.stats-row{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:var(--space-sm);
}
.stat-pill{
  text-align:center;
  padding:var(--space-sm) var(--space-xs);
}
.stat-num{
  font-family:var(--font-headline);
  font-size:1.5rem;
  font-weight:700;
  color:var(--primary);
  letter-spacing:-0.02em;
  display:block;
}
.stat-label{
  font-size:0.7rem;
  font-weight:500;
  color:var(--fg-muted);
  text-transform:uppercase;
  letter-spacing:0.05em;
}

/* Category chips */
.filter-strip{
  padding:var(--space-md) var(--space-xl);
  display:flex;
  gap:var(--space-sm);
  overflow-x:auto;
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.filter-strip::-webkit-scrollbar{display:none}
.city-chip{
  flex-shrink:0;
  border:1px solid var(--border-strong);
  background:var(--surface-container-low);
  color:var(--fg-2);
  font-size:0.75rem;
  font-weight:500;
  padding:var(--space-xs) var(--space-md);
  border-radius:var(--radius-pill);
  cursor:pointer;
  transition:all 140ms ease;
  white-space:nowrap;
}
.city-chip:hover{background:var(--surface-container);color:var(--fg-1)}
.city-chip.active{
  background:var(--primary);
  color:var(--on-primary);
  border-color:var(--primary);
}
.city-chip .chip-count{
  opacity:0.7;
  margin-left:3px;
  font-family:var(--font-mono);
  font-size:0.7rem;
}

/* Waypoint browser */
.waypoint-browser{
  flex:1;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--outline-variant) transparent;
}
.waypoint-browser::-webkit-scrollbar{width:4px}
.waypoint-browser::-webkit-scrollbar-thumb{background:var(--outline-variant);border-radius:2px}

.place-item{
  display:flex;
  gap:var(--space-md);
  align-items:flex-start;
  padding:var(--space-md) var(--space-xl);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:background 140ms ease;
}
.place-item:hover{background:var(--surface-container-low)}
.place-item.active{background:var(--surface-container);border-left:3px solid var(--primary)}
.place-item.hidden{display:none}
.place-index{
  font-family:var(--font-mono);
  font-size:0.7rem;
  color:var(--fg-muted);
  padding-top:3px;
  min-width:20px;
}
.place-info{flex:1;min-width:0}
.place-name{
  font-family:var(--font-headline);
  font-size:0.88rem;
  font-weight:600;
  color:var(--fg-1);
  letter-spacing:-0.01em;
  line-height:1.3;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.place-name mark{
  background:var(--primary-fixed);
  color:var(--primary);
  border-radius:2px;
  padding:0 2px;
}
.place-city{
  font-size:0.75rem;
  color:var(--fg-muted);
  margin-top:1px;
}
.place-note{
  font-size:0.75rem;
  color:var(--fg-2);
  margin-top:var(--space-xs);
  font-style:italic;
  line-height:1.4;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.place-maps-link{
  color:var(--primary);
  font-size:0.7rem;
  text-decoration:none;
  flex-shrink:0;
  padding-top:3px;
  opacity:0.75;
  transition:opacity 120ms;
}
.place-maps-link:hover{opacity:1}

/* ── DETAIL PANEL (slide-over on map) ── */
.detail-panel{
  position:absolute;
  top:var(--space-lg);
  left:var(--space-lg);
  width:280px;
  background:var(--surface-container-lowest);
  border:1px solid var(--border-strong);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-lg);
  z-index:30;
  padding:var(--space-xl);
  transform:translateX(-120%) scale(0.96);
  transition:transform 280ms cubic-bezier(.4,0,.2,1), opacity 280ms ease;
  opacity:0;
  pointer-events:none;
}
.detail-panel.open{
  transform:translateX(0) scale(1);
  opacity:1;
  pointer-events:all;
}
.detail-close{
  position:absolute;
  top:var(--space-md);
  right:var(--space-md);
  background:var(--surface-container);
  border:none;
  border-radius:var(--radius-pill);
  width:28px;height:28px;
  cursor:pointer;
  color:var(--fg-muted);
  font-size:0.9rem;
  display:flex;align-items:center;justify-content:center;
  transition:background 120ms;
}
.detail-close:hover{background:var(--surface-container-high);color:var(--fg-1)}
.detail-pin-badge{
  width:32px;height:32px;
  background:var(--gradient-primary);
  border-radius:50% 50% 50% 0;
  transform:rotate(-45deg);
  margin-bottom:var(--space-lg);
  box-shadow:var(--shadow-accent);
}
.detail-name{
  font-family:var(--font-headline);
  font-size:1rem;
  font-weight:700;
  color:var(--fg-1);
  letter-spacing:-0.01em;
  line-height:1.3;
  margin-bottom:var(--space-xs);
}
.detail-city{
  font-size:0.8rem;
  color:var(--fg-muted);
  margin-bottom:var(--space-md);
  display:flex;
  align-items:center;
  gap:var(--space-xs);
}
.detail-note{
  font-size:0.85rem;
  color:var(--fg-2);
  font-style:italic;
  line-height:1.5;
  background:var(--surface-container-low);
  border-radius:var(--radius-md);
  padding:var(--space-md);
  margin-bottom:var(--space-lg);
}
.detail-comment{
  font-size:0.78rem;
  color:var(--fg-muted);
  margin-bottom:var(--space-lg);
}
.detail-actions{
  display:flex;
  gap:var(--space-sm);
  flex-wrap:wrap;
}
.btn-maps{
  display:inline-flex;
  align-items:center;
  gap:var(--space-xs);
  background:var(--gradient-primary);
  color:var(--on-primary);
  font-family:var(--font-body);
  font-size:0.78rem;
  font-weight:600;
  padding:var(--space-sm) var(--space-lg);
  border-radius:var(--radius-pill);
  text-decoration:none;
  box-shadow:var(--shadow-accent);
  transition:filter 120ms;
}
.btn-maps:hover{filter:brightness(1.1)}
.btn-copy{
  display:inline-flex;
  align-items:center;
  gap:var(--space-xs);
  background:var(--surface-container);
  color:var(--fg-2);
  font-family:var(--font-body);
  font-size:0.78rem;
  font-weight:500;
  padding:var(--space-sm) var(--space-md);
  border-radius:var(--radius-pill);
  border:1px solid var(--border-strong);
  cursor:pointer;
  transition:all 120ms;
}
.btn-copy:hover{background:var(--surface-container-high);color:var(--fg-1)}

/* ── LIST VIEW ── */
.list-view{
  display:none;
  flex-direction:column;
  height:calc(100vh - 65px);
  overflow:hidden;
}
.list-view.active{display:flex}
@media(max-width:768px){
  .list-view{height:auto;overflow:visible}
}
.list-header{
  padding:var(--space-xl) var(--space-3xl);
  background:var(--surface-container-low);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:var(--space-md);
}
.list-header h2{
  font-family:var(--font-headline);
  font-size:1rem;
  font-weight:600;
  color:var(--fg-1);
}
.list-count{
  font-size:0.78rem;
  color:var(--fg-muted);
  font-family:var(--font-mono);
}
.list-table-wrap{
  flex:1;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:var(--outline-variant) transparent;
}
table.places-table{
  width:100%;
  border-collapse:collapse;
}
table.places-table th{
  text-align:left;
  font-family:var(--font-headline);
  font-size:0.72rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:0.07em;
  color:var(--fg-muted);
  padding:var(--space-md) var(--space-xl);
  background:var(--surface-container-low);
  border-bottom:1px solid var(--border-strong);
  cursor:pointer;
  white-space:nowrap;
  position:sticky;
  top:0;
  z-index:5;
}
table.places-table th:hover{color:var(--fg-1)}
table.places-table th .sort-arrow{
  display:inline-block;
  margin-left:4px;
  opacity:0.4;
  transition:opacity 100ms;
}
table.places-table th.sorted .sort-arrow{opacity:1;color:var(--primary)}
table.places-table td{
  padding:var(--space-md) var(--space-xl);
  border-bottom:1px solid var(--border);
  font-size:0.83rem;
  vertical-align:top;
}
table.places-table tr.row-hidden{display:none}
table.places-table tr:hover td{background:var(--surface-container-low)}
table.places-table tr.row-selected td{background:var(--surface-container)}
.td-name{
  font-family:var(--font-headline);
  font-weight:600;
  font-size:0.85rem;
  color:var(--fg-1);
  letter-spacing:-0.01em;
  max-width:240px;
}
.td-name a{
  color:inherit;
  text-decoration:none;
}
.td-name a:hover{color:var(--primary)}
.td-city{color:var(--fg-2);white-space:nowrap}
.td-note{color:var(--fg-muted);font-style:italic;max-width:200px}
mark{
  background:var(--primary-fixed);
  color:var(--primary-container);
  border-radius:2px;
  padding:0 2px;
}

/* ── NO RESULTS ── */
.no-results{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:var(--space-lg);
  padding:var(--space-5xl) var(--space-2xl);
  color:var(--fg-muted);
  font-size:0.9rem;
  text-align:center;
}
.no-results.visible{display:flex}

/* ── RESPONSIVE ── */
@media(max-width:480px){
  .atlas-header{padding:var(--space-md) var(--space-lg)}
  .search-box{min-width:140px}
  .detail-panel{width:calc(100vw - 32px);left:var(--space-lg)}
}

/* ── MOTION ── */
@media(prefers-reduced-motion:reduce){
  .map-pin.drop-in{animation:none}
  .detail-panel{transition:none}
}

/* ── MAP BG GRID ── */
.map-grid-line{
  stroke:rgba(100,120,160,0.07);
  stroke-width:0.5;
}

/* ── SELECTED PIN PULSE ── */
@keyframes pinPulse{
  0%{r:8;opacity:0.5}
  70%{r:14;opacity:0}
  100%{r:14;opacity:0}
}
.pin-pulse{
  animation:pinPulse 900ms ease-out infinite;
  fill:var(--primary);
  pointer-events:none;
}
</style>
<!-- html-anything example style skin:start -->

<style id="html-anything-example-style-skin">
html[data-ha-style] {
  --ha-style-accent: var(--primary, #a03b00);
  --ha-style-accent-2: var(--secondary-container, #7b40e0);
  --ha-style-badge-bg: rgba(255,255,255,.78);
  --ha-style-badge-fg: var(--fg-1, #1e1b19);
}
html[data-ha-style] body {
  position: relative;
  background-attachment: fixed;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function getCityFromPlace(p) {
  // Try to extract city from name
  const name = p.name || '';
  // check against known cities
  const cities = ['Tokyo','Kyoto','Paris','Lisbon','Mexico City','Stockholm','Reykjavik','Marrakech','Sydney','Turin','New York','London','Barcelona','Rome','Berlin','Amsterdam','Copenhagen','Vienna','Prague','Budapest','Osaka','Seville','Dubrovnik','Istanbul','Athens','Santorini'];
  for (const c of cities) {
    if (name.includes(c)) return c;
  }
  // Try comma-separated
  const parts = name.split(',').map(s => s.trim());
  if (parts.length >= 2) return parts[parts.length - 2];
  return parts[parts.length - 1] || 'Unknown';
}

function getCountryFromCoords(lat, lng) {
  if (lat > 20 && lat < 50 && lng > 120 && lng < 150) return 'JP';
  if (lat > 30 && lat < 50 && lng > 125 && lng < 145) return 'JP';
  if (lat > 34 && lat < 46 && lng > 130 && lng < 146) return 'JP';
  if (lat > 24 && lat < 50 && lng > 120 && lng < 150) return 'JP';
  if (lat > 30 && lat < 46 && lng > 129 && lng < 148) return 'JP';
  if (lat > 30 && lat < 47 && lng > 128 && lng < 150) return 'JP';
  if (lat > 30 && lat < 46 && lng > 128 && lng < 148) return 'JP';
  // Japan
  if (lat >= 30 && lat <= 46 && lng >= 129 && lng <= 148) return 'JP';
  // France
  if (lat >= 42 && lat <= 51 && lng >= -5 && lng <= 10) return 'FR';
  // Portugal
  if (lat >= 36 && lat <= 42 && lng >= -10 && lng <= -6) return 'PT';
  // Mexico
  if (lat >= 14 && lat <= 33 && lng >= -118 && lng <= -86) return 'MX';
  // Sweden
  if (lat >= 55 && lat <= 70 && lng >= 10 && lng <= 25) return 'SE';
  // Iceland
  if (lat >= 63 && lat <= 67 && lng >= -26 && lng <= -13) return 'IS';
  // Morocco
  if (lat >= 27 && lat <= 36 && lng >= -14 && lng <= 0) return 'MA';
  // Australia
  if (lat >= -44 && lat <= -10 && lng >= 112 && lng <= 155) return 'AU';
  // Italy
  if (lat >= 36 && lat <= 47 && lng >= 6 && lng <= 18) return 'IT';
  // Peru
  if (lat >= -18 && lat <= -2 && lng >= -82 && lng <= -68) return 'PE';
  // USA
  if (lat >= 24 && lat <= 50 && lng >= -126 && lng <= -65) return 'US';
  return '??';
}

let places = [];

// ─── Stats ────────────────────────────────────────────────────────────────────
function buildStats() {
  const total = places.length;
  const countries = [...new Set(places.map(p => p.country).filter(c => c !== '??'))].length;
  const cities = [...new Set(places.map(p => p.city))].length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statCountries').textContent = countries;
  document.getElementById('statCities').textContent = cities;

  // Personal note
  const topCities = DATA.topCities || [];
  const topCity = topCities[0];
  let note = `You've saved ${total} place${total !== 1 ? 's' : ''} across ${cities} cities and ${countries} countries`;
  if (topCity) note += ` — ${topCity.count} of them are in ${topCity.name}`;
  note += '.';
  document.getElementById('personalNote').textContent = note;
}

// ─── Filter Chips ─────────────────────────────────────────────────────────────
function buildFilterChips() {
  const strip = document.getElementById('filterStrip');
  const cityCounts = {};
  places.forEach(p => { cityCounts[p.city] = (cityCounts[p.city] || 0) + 1; });
  const sorted = Object.entries(cityCounts).sort((a,b) => b[1]-a[1]);

  const allChip = document.createElement('button');
  allChip.className = 'city-chip active';
  allChip.id = 'chip-all';
  allChip.innerHTML = `All <span class="chip-count">${places.length}</span>`;
  allChip.onclick = () => filterByCity(null);
  strip.appendChild(allChip);

  sorted.forEach(([city, count]) => {
    const chip = document.createElement('button');
    chip.className = 'city-chip';
    chip.id = `chip-${city}`;
    chip.innerHTML = `${city} <span class="chip-count">${count}</span>`;
    chip.onclick = () => filterByCity(city);
    strip.appendChild(chip);
  });
}

function filterByCity(city) {
  selectedCity = city;
  document.querySelectorAll('.city-chip').forEach(c => c.classList.remove('active'));
  const active = city ? document.getElementById(`chip-${city}`) : document.getElementById('chip-all');
  if (active) active.classList.add('active');
  applyFilters();
}

// ─── Filtering ────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchQuery.toLowerCase();
  filteredPlaces = places.filter(p => {
    const cityMatch = !selectedCity || p.city === selectedCity;
    const searchMatch = !q || p.name.toLowerCase().includes(q) || (p.note||'').toLowerCase().includes(q) || p.city.toLowerCase().includes(q);
    return cityMatch && searchMatch;
  });
  updateWaypointBrowser();
  updateMapPins();
  updateTable();
}

// ─── World Map ────────────────────────────────────────────────────────────────
function buildMap() {
  const svg = document.getElementById('worldSvg');
  
  // Background
  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('width','960');
  bg.setAttribute('height','500');
  bg.setAttribute('fill','var(--map-water)');
  svg.appendChild(bg);

  // Grid lines
  const gridG = document.createElementNS('http://www.w3.org/2000/svg','g');
  gridG.setAttribute('class','grid-layer');
  for (let lng = -180; lng <= 180; lng += 30) {
    const [x] = project(lng, 0);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', x); line.setAttribute('y1', 0);
    line.setAttribute('x2', x); line.setAttribute('y2', 500);
    line.setAttribute('class','map-grid-line');
    gridG.appendChild(line);
  }
  for (let lat = -90; lat <= 90; lat += 30) {
    const [,y] = project(0, lat);
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', 0); line.setAttribute('y1', y);
    line.setAttribute('x2', 960); line.setAttribute('y2', y);
    line.setAttribute('class','map-grid-line');
    gridG.appendChild(line);
  }
  svg.appendChild(gridG);

  // Countries
  const countryG = document.createElementNS('http://www.w3.org/2000/svg','g');
  countryG.setAttribute('class','country-layer');
  WORLD_COUNTRIES.forEach(([id, rings]) => {
    rings.forEach(ring => {
      const path = document.createElementNS('http://www.w3.org/2000/svg','polygon');
      const pts = ring.map(([lng,lat]) => project(lng,lat).join(',')).join(' ');
      path.setAttribute('points', pts);
      path.setAttribute('fill','var(--map-land)');
      path.setAttribute('stroke','var(--map-border)');
      path.setAttribute('stroke-width','0.5');
      path.setAttribute('data-country', id);
      countryG.appendChild(path);
    });
  });
  svg.appendChild(countryG);

  // Pins layer
  const pinG = document.createElementNS('http://www.w3.org/2000/svg','g');
  pinG.setAttribute('class','pins-layer');
  pinG.setAttribute('id','pinsLayer');
  svg.appendChild(pinG);

  // Pan group wrapper
  const panG = document.createElementNS('http://www.w3.org/2000/svg','g');
  panG.setAttribute('id','panGroup');
  // Move all children into panG
  while (svg.firstChild) panG.appendChild(svg.firstChild);
  svg.appendChild(panG);

  renderPins();
}

function renderPins() {
  const panGroup = document.getElementById('panGroup');
  let pinLayer = panGroup.querySelector('.pins-layer');
  if (!pinLayer) {
    // Re-get after restructure
    pinLayer = document.getElementById('pinsLayer');
  }
  if (!pinLayer) return;
  pinLayer.innerHTML = '';

  // Group by close proximity (cluster within ~15px at scale 1)
  const CLUSTER_DIST = 12;
  const clusters = [];
  places.forEach(p => {
    const [px, py] = project(p.lng, p.lat);
    let found = false;
    for (const cl of clusters) {
      const dx = cl.cx - px, dy = cl.cy - py;
      if (Math.sqrt(dx*dx + dy*dy) < CLUSTER_DIST) {
        cl.places.push(p);
        cl.cx = cl.places.reduce((s,pp) => s + project(pp.lng, pp.lat)[0], 0) / cl.places.length;
        cl.cy = cl.places.reduce((s,pp) => s + project(pp.lng, pp.lat)[1], 0) / cl.places.length;
        found = true;
        break;
      }
    }
    if (!found) clusters.push({ cx: px, cy: py, places: [p] });
  });

  clusters.forEach((cl, ci) => {
    if (cl.places.length === 1) {
      renderSinglePin(pinLayer, cl.places[0], ci);
    } else {
      renderClusterPin(pinLayer, cl, ci);
    }
  });
}

function renderSinglePin(layer, p, delay) {
  const [px, py] = project(p.lng, p.lat);
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','map-pin');
  g.setAttribute('data-id', p.id);
  g.setAttribute('transform',`translate(${px},${py})`);
  g.style.animationDelay = `${delay * 12}ms`;

  // Pin shape: teardrop
  const head = document.createElementNS('http://www.w3.org/2000/svg','circle');
  head.setAttribute('cx','0'); head.setAttribute('cy','-10');
  head.setAttribute('r','6');
  head.setAttribute('class','pin-head');
  
  const stem = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  stem.setAttribute('points','-3,-8 3,-8 0,0');
  stem.setAttribute('class','pin-stem');

  const hitArea = document.createElementNS('http://www.w3.org/2000/svg','circle');
  hitArea.setAttribute('cx','0'); hitArea.setAttribute('cy','-10');
  hitArea.setAttribute('r','12');
  hitArea.setAttribute('fill','transparent');

  g.appendChild(stem);
  g.appendChild(head);
  g.appendChild(hitArea);

  g.addEventListener('click', (e) => { e.stopPropagation(); selectPlace(p); });
  g.addEventListener('mouseenter', (e) => showTooltip(e, p.name, p.note));
  g.addEventListener('mouseleave', hideTooltip);

  layer.appendChild(g);
}

function renderClusterPin(layer, cl, delay) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','pin-cluster');
  g.setAttribute('transform',`translate(${cl.cx},${cl.cy})`);

  const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
  circle.setAttribute('cx','0'); circle.setAttribute('cy','0');
  circle.setAttribute('r', Math.min(14, 8 + cl.places.length));
  circle.setAttribute('fill','var(--primary)');
  circle.setAttribute('stroke','var(--on-primary)');
  circle.setAttribute('stroke-width','1.5');
  circle.setAttribute('opacity','0.9');

  const text = document.createElementNS('http://www.w3.org/2000/svg','text');
  text.setAttribute('x','0'); text.setAttribute('y','4');
  text.setAttribute('text-anchor','middle');
  text.setAttribute('font-size','9');
  text.setAttribute('font-family','var(--font-headline)');
  text.setAttribute('font-weight','700');
  text.setAttribute('fill','white');
  text.textContent = cl.places.length;

  g.appendChild(circle);
  g.appendChild(text);

  g.addEventListener('click', (e) => {
    e.stopPropagation();
    if (cl.places.length === 1) {
      selectPlace(cl.places[0]);
    } else {
      // Filter to first place city
      filterByCity(cl.places[0].city);
    }
  });
  g.addEventListener('mouseenter', (e) => {
    const names = cl.places.slice(0,3).map(p => p.name.split(',')[0]).join(', ');
    showTooltip(e, `${cl.places.length} places`, names + (cl.places.length > 3 ? '…' : ''));
  });
  g.addEventListener('mouseleave', hideTooltip);

  layer.appendChild(g);
}

function updateMapPins() {
  const allPins = document.querySelectorAll('.map-pin');
  allPins.forEach(pin => {
    const id = parseInt(pin.getAttribute('data-id'));
    const visible = filteredPlaces.some(p => p.id === id);
    pin.style.opacity = visible ? '1' : '0.15';
    pin.style.pointerEvents = visible ? 'all' : 'none';
  });
}

function animatePinsIn() {
  setTimeout(() => {
    document.querySelectorAll('.map-pin').forEach(pin => {
      pin.classList.add('drop-in');
    });
  }, 200);
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
function showTooltip(evt, name, note) {
  const tt = document.getElementById('mapTooltip');
  const stage = document.getElementById('atlasStage');
  const rect = stage.getBoundingClientRect();
  const x = evt.clientX - rect.left + 12;
  const y = evt.clientY - rect.top - 10;
  tt.innerHTML = `<strong>${escapeHtml(name.split(',')[0])}</strong>${note ? '<span>' + escapeHtml(note) + '</span>' : ''}`;
  tt.style.left = Math.min(x, rect.width - 220) + 'px';
  tt.style.top = Math.max(y - 50, 8) + 'px';
  tt.style.display = 'block';
}
function hideTooltip() {
  document.getElementById('mapTooltip').style.display = 'none';
}

// ─── Select Place ─────────────────────────────────────────────────────────────
function selectPlace(p) {
  selectedPlace = p;
  hideTooltip();

  // Update pin highlight
  document.querySelectorAll('.map-pin').forEach(el => el.classList.remove('selected'));

  else detailNote.style.display = 'none';

  document.getElementById('detailPanel').classList.add('open');

  // Copy btn
  document.getElementById('detailCopyBtn').onclick = () => {
    navigator.clipboard.writeText(p.name).then(() => {
      const btn = document.getElementById('detailCopyBtn');
      btn.textContent = '✓ Copied';
      setTimeout(() => { btn.textContent = '⎘ Copy name'; }, 1800);
    });
  };

  // Highlight in list
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('active'));

function panToPlace(p) {
  const svg = document.getElementById('worldSvg');
  const rect = svg.getBoundingClientRect();
  const [px, py] = project(p.lng, p.lat);
  const targetX = rect.width / 2 - px * svgTransform.scale;
  const targetY = rect.height / 2 - py * svgTransform.scale;
  svgTransform.x = targetX;
  svgTransform.y = targetY;
  applyTransform(true);
}
