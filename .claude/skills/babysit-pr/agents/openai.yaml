interface:
  display_name: "PR Lifecycle Operator"
  short_description: "Create, monitor, fix, and validate a PR through deployment"
  default_prompt: "Own the current pull request end-to-end: respect the repo's PR template, create or update the PR body, start the 60-second watcher after push, address valid CI failures and review feedback, treat explicit reviewer scores as quality gates, and after merge monitor deployment signals until production looks healthy or a real blocker needs user help."
